services:

  staging:
    image: cicd-demo:latest   # ローカルビルドイメージを使用
    ports:
      - "3001:3000"             # ホスト3001 → コンテナ3000
    environment:
      - APP_ENV=staging
      - APP_VERSION=local-build

  production:
    image: cicd-demo:latest
    ports:
      - "3002:3000"             # ホスト3002 → コンテナ3000
    environment:
      - APP_ENV=production
      - APP_VERSION=local-build