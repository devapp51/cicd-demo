name: CI / Build & Push

on:
  push:
    branches: ["main"]       # main push → テストのみ実行
    tags: ["v*.*.*"]        # タグ push → ビルド+イメージ push まで実行
  pull_request:
    branches: ["main"]       # PR → テストのみ実行

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → ghcr.io/YOUR_USERNAME/cicd-demo

jobs:
  # -------- ① テスト --------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # -------- ② Docker ビルド & push（タグ push 時のみ） --------
  build-and-push:
    needs: test                  # テスト成功後にのみ実行
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')   # タグの時だけ
    permissions:
      contents: read
      packages: write           # GHCR への push に必要

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ビルド完了 :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY